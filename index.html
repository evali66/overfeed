
<!DOCTYPE html>
<!--
  Overfeed — Eva Li
  Technique adapted from Jenny Ye's "The Noise Says Breathe"
  https://jianiye-coder.github.io/noise-says-breathe/
-->
<html>
  <head>
    <title>Overfeed</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: #fdf6f0;
        font-family: Georgia, serif;
        cursor: crosshair;
      }
      .compliment {
        position: absolute;
        color: #b56576;
        font-style: italic;
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
        transition: transform 2s ease-in, opacity 2s ease-in;
      }
      /* when the crash happens, this class gets added to every compliment */
      .crashed {
        transform: translateY(120vh) rotate(60deg) !important;
        opacity: 0 !important;
      }
      .hint {
        position: fixed;
        bottom: 20px;
        left: 20px;
        opacity: 0.4;
        font-size: 13px;
        color: #6d4c5b;
      }

      /* the bar — bigger now */
      .bar-label {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 16px;
        font-style: italic;
        color: #6d4c5b;
        opacity: 0.8;
        letter-spacing: 0.05em;
      }
      .bar-track {
        position: fixed;
        top: 58px;
        left: 50%;
        transform: translateX(-50%);
        width: 500px;
        height: 12px;
        background: rgba(109, 76, 91, 0.15);
        border-radius: 6px;
      }
      .bar-fill {
        width: 0%;
        height: 100%;
        background: #b56576;
        border-radius: 6px;
        transition: width 0.5s ease, background 1s ease;
      }
    </style>
  </head>
  <body>
    <div class="bar-label">self-confidence</div>
    <div class="bar-track">
      <div class="bar-fill" id="fill"></div>
    </div>

    <p class="hint">move your mouse · press R to reset</p>

    <script>
      const compliments = [
        "you look great today",
        "you're so thoughtful",
        "you matter",
        "you're enough",
        "you're doing your best",
        "you're loved",
        "you're so kind",
        "you're amazing",
        "you got this",
        "you're beautiful",
        "you deserve good things",
        "you're appreciated"
      ];

      let count = 0;
      let crashed = false;  // tracks if the crash already happened
      const fill = document.getElementById("fill");

      document.addEventListener("mousemove", (e) => {
        // after the crash, don't spawn new compliments
        if (crashed) return;

        const word = document.createElement("div");
        word.className = "compliment";
        word.textContent = compliments[Math.floor(Math.random() * compliments.length)];
        word.style.left = e.clientX + "px";
        word.style.top = e.clientY + "px";
        word.style.fontSize = (14 + Math.random() * 10) + "px";
        word.style.transform = "rotate(" + (Math.random() * 20 - 10) + "deg)";
        document.body.appendChild(word);

        // update the bar
        count++;
        let confidence;
        if (count < 60) {
          confidence = count * 1.8;          // rises
        } else if (count < 180) {
          confidence = 100;                  // peaks
        } else if (count < 500) {
          confidence = 100 - (count - 180) * 0.22;  // slowly drops
        } else {
          confidence = Math.max(0, 30 - (count - 500) * 0.1);  // crashes
        }
        fill.style.width = confidence + "%";

        // change the bar color as confidence drops
        if (confidence < 30) {
          fill.style.background = "#6d6d6d";  // grey when drained
        } else if (confidence < 70) {
          fill.style.background = "#a07a85";  // muted
        }

        // when confidence hits zero, trigger the crash
        if (confidence <= 0 && !crashed) {
          triggerCrash();
        }
      });

      // makes every compliment fall down and fade out
      function triggerCrash() {
        crashed = true;
        document.querySelectorAll(".compliment").forEach((w) => {
          // give each word a slightly different delay so they don't all fall at once
          const delay = Math.random() * 800;
          setTimeout(() => {
            w.classList.add("crashed");
          }, delay);
        });
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "r" || e.key === "R") {
          document.querySelectorAll(".compliment").forEach(w => w.remove());
          count = 0;
          crashed = false;
          fill.style.width = "0%";
          fill.style.background = "#b56576";
        }
      });
    </script>
  </body>
</html>
